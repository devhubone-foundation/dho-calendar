# Render Blueprint (GitHub issue #6): single Nginx-fronted web service +
# free managed Postgres. See docs/RENDER_DEPLOY.md for the first-deploy
# checklist (including the two placeholder URLs below, which can only be
# filled in after Render assigns the service's public *.onrender.com URL).
#
# Deliberately excluded from Version 1 (PRODUCT_BLUEPRINT.md §4/ARCHITECTURE.md
# §25): a custom domain, cloud object storage, and a persistent uploads Disk.
# Free-tier limitations (ephemeral uploads, ~30-day Postgres expiry, cold
# starts) are documented in docs/RENDER_DEPLOY.md and must not be silently
# worked around.
services:
  - type: web
    name: dho-calendar
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    # Applies committed Prisma migrations before the new version starts
    # serving traffic (ARCHITECTURE.md §22). The seed is intentionally NOT
    # run here — run it once via the Render Shell (docs/RENDER_DEPLOY.md).
    preDeployCommand: pnpm --filter @dho/database prisma:migrate:deploy
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: dho-calendar-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 30d
      # PLACEHOLDER: after the first deploy, Render assigns the public
      # https://<service>.onrender.com URL. Update both values to that exact
      # URL and save (which triggers a redeploy) — same-origin auth
      # (SameSite=lax cookie) and CORS depend on this being correct.
      - key: APP_ORIGIN
        value: https://dho-calendar.onrender.com
      - key: API_ORIGIN
        value: https://dho-calendar.onrender.com
      - key: OFFICE_TIMEZONE
        value: Europe/Sofia
      - key: UPLOAD_ROOT
        value: ./data/uploads
      - key: LOGIN_RATE_LIMIT_MAX_ATTEMPTS
        value: "5"
      - key: LOGIN_RATE_LIMIT_WINDOW_MINUTES
        value: "15"
      - key: LOGIN_RATE_LIMIT_LOCKOUT_MINUTES
        value: "15"
      - key: ATTENDANCE_WARNING_LOOKAHEAD_DAYS
        value: "14"
      # NEXT_PUBLIC_API_ORIGIN / NEXT_PUBLIC_WS_ORIGIN are intentionally
      # absent: they're inlined into the browser bundle at Docker build time
      # (Dockerfile.render passes no build args for them), so the client
      # falls back to same-origin relative requests and a same-host
      # WebSocket (apps/web/lib/auth/api-client.ts, socket-client.ts).

databases:
  - name: dho-calendar-db
    plan: free
    databaseName: dho_calendar
    user: dho_calendar
